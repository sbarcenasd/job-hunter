# Configuración de Fuentes de Empleo
sources:
  - name: "RemoteOK"
    url: "https://remoteok.com/remote-dev-jobs.rss"
    type: "rss"
    location: "remote"
    enabled: false
  
  - name: "LinkedIn Colombia"
    url: "https://news.google.com/rss/search?q=full+stack+developer+site:linkedin.com/jobs&hl=es&gl=co"
    type: "rss"
    location: "colombia"
    enabled: false
  
  - name: "LinkedIn Remoto"
    url: "https://news.google.com/rss/search?q=full+stack+node+site:linkedin.com/jobs&hl=es&gl=mx"
    type: "rss"
    location: "remote"
    enabled: false
  
  - name: "Indeed Colombia"
    url: "https://news.google.com/rss/search?q=desarrollador+full+stack&hl=es&gl=co"
    type: "rss"
    location: "colombia"
    enabled: false

  # Scrapers
  - name: "LinkedIn Scraping"
    type: "scraper"
    location: "colombia"
    enabled: false
    searchUrl: "https://www.linkedin.com/jobs/search/?keywords={keyword}&location={location}&f_TPR=r604800"
    keywords:
      - "full stack developer"
      - "nodejs developer"
      - "nestjs developer"
  
  - name: "Computrabajo"
    type: "scraper"
    location: "colombia"
    enabled: true
    url: "https://co.computrabajo.com/trabajo-de-{keyword}"
    keywords:
      - "desarrollador-full-stack"
      - "nodejs"
      - "full-stack-developer"